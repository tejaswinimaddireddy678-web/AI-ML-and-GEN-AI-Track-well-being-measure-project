<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Human Development Index Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <div class="container mx-auto px-4 py-8 max-w-6xl" x-data="hdiApp()">
        
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-teal-400 to-indigo-400 bg-clip-text text-transparent">
                    HDI Explorer & Simulation Tool
                </h1>
                <p class="text-slate-400 text-sm mt-1">Simulate developmental policies using official UNDP mathematical frameworks.</p>
            </div>
            
            <div class="mt-4 md:mt-0 w-full md:w-80">
                <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Select Country from CSV</label>
                <select @change="fetchCountry($el.value)" class="w-full bg-slate-800 border border-slate-700 text-slate-200 rounded-lg px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="">-- Search & Choose Country --</option>
                    {% for c in countries %}
                        <option value="{{ c.ISO3 }}">{{ c.Country }} ({{ c.ISO3 }})</option>
                    {% endfor %}
                </select>
            </div>
        </header>

        <template x-if="!countryData">
            <div class="text-center py-16 bg-slate-800/20 border border-slate-800 rounded-2xl">
                <div class="text-indigo-400 text-5xl mb-4">🌍</div>
                <h2 class="text-xl font-bold">No Country Loaded</h2>
                <p class="text-slate-400 text-sm mt-1 max-w-md mx-auto">Select an economy from the dropdown above to load genuine 1990-2021 timeline data and unlock policy simulation features.</p>
            </div>
        </template>

        <template x-if="countryData">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                
                <div class="lg:col-span-5 flex flex-col gap-6">
                    <div class="bg-slate-800/80 border border-slate-700 p-5 rounded-2xl shadow-lg">
                        <div class="flex justify-between items-start">
                            <div>
                                <span class="bg-indigo-500/10 text-indigo-400 text-[10px] font-bold px-2.5 py-1 rounded-full uppercase tracking-wider" x-text="countryData.group"></span>
                                <h2 class="text-2xl font-bold text-white mt-2" x-text="countryData.country"></h2>
                            </div>
                            <div class="text-right">
                                <span class="text-slate-500 text-xs font-bold block">2021 RANK</span>
                                <span class="text-2xl font-extrabold text-cyan-400" x-text="'#' + countryData.rank_2021"></span>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4 mt-6 border-t border-slate-700/60 pt-4 text-sm">
                            <div>
                                <span class="text-slate-400 text-xs block">UNDP Region</span>
                                <span class="font-semibold text-slate-200" x-text="countryData.region || 'None'"></span>
                            </div>
                            <div>
                                <span class="text-slate-400 text-xs block">Reported 2021 HDI</span>
                                <span class="font-mono font-bold text-slate-200" x-text="Number(countryData.hdi_2021).toFixed(3)"></span>
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-800/80 border border-slate-700 p-5 rounded-2xl shadow-lg flex-1">
                        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4">Historical HDI Trend (1990 - 2021)</h3>
                        <div class="relative h-64">
                            <canvas id="historyChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-7 space-y-6">
                    <div class="bg-slate-800/50 border border-slate-700/60 p-6 rounded-2xl shadow-xl">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-md font-bold text-white">🎛️ Policy Simulation Sandbox</h3>
                            <button @click="resetToBaselines" class="text-xs text-indigo-400 hover:text-indigo-300 font-medium">🔄 Reset to Real Baseline</button>
                        </div>

                        <div class="space-y-6">
                            <div class="space-y-1">
                                <div class="flex justify-between items-center text-sm">
                                    <span class="text-slate-300 font-medium">Life Expectancy at Birth</span>
                                    <span class="font-mono text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded border border-emerald-500/20" x-text="simValues.health + ' yrs'"></span>
                                </div>
                                <input type="range" x-model.number="simValues.health" min="20" max="85" step="0.1" class="w-full accent-emerald-500 cursor-pointer bg-slate-700 h-1.5 rounded">
                            </div>

                            <div class="space-y-1">
                                <div class="flex justify-between items-center text-sm">
                                    <span class="text-slate-300 font-medium">Expected Years of Schooling</span>
                                    <span class="font-mono text-sky-400 bg-sky-500/10 px-2 py-0.5 rounded border border-sky-500/20" x-text="simValues.expected_schooling + ' yrs'"></span>
                                </div>
                                <input type="range" x-model.number="simValues.expected_schooling" min="0" max="18" step="0.1" class="w-full accent-sky-500 cursor-pointer bg-slate-700 h-1.5 rounded">
                            </div>

                            <div class="space-y-1">
                                <div class="flex justify-between items-center text-sm">
                                    <span class="text-slate-300 font-medium">Mean Years of Schooling</span>
                                    <span class="font-mono text-cyan-400 bg-cyan-500/10 px-2 py-0.5 rounded border border-cyan-500/20" x-text="simValues.mean_schooling + ' yrs'"></span>
                                </div>
                                <input type="range" x-model.number="simValues.mean_schooling" min="0" max="15" step="0.1" class="w-full accent-cyan-500 cursor-pointer bg-slate-700 h-1.5 rounded">
                            </div>

                            <div class="space-y-1">
                                <div class="flex justify-between items-center text-sm">
                                    <span class="text-slate-300 font-medium">GNI per Capita (PPP $)</span>
                                    <span class="font-mono text-amber-400 bg-amber-500/10 px-2 py-0.5 rounded border border-amber-500/20" x-text="'$' + formatCurrency(simValues.gni)"></span>
                                </div>
                                <input type="range" x-model.number="simValues.gni" min="100" max="75000" step="100" class="w-full accent-amber-500 cursor-pointer bg-slate-700 h-1.5 rounded">
                            </div>
                        </div>
                    </div>

                    <div class="bg-gradient-to-br from-slate-800 to-indigo-950/40 border border-indigo-500/20 p-6 rounded-2xl shadow-xl">
                        <h4 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-4">Simulated Forecast Outcomes</h4>
                        
                        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                            <div>
                                <span class="text-xs text-slate-400">Predicted Dynamic HDI</span>
                                <div class="text-5xl font-black font-mono text-white tracking-tight mt-1" x-text="getCalculatedHDI().toFixed(3)"></div>
                            </div>
                            
                            <div>
                                <span class="text-xs text-slate-400 block mb-1.5">Forecast Classification</span>
                                <span class="px-3.5 py-2 rounded-xl text-xs font-bold border block text-center" :class="getTierClass()" x-text="getTierName() + ' Human Development'"></span>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6 border-t border-slate-700/60 pt-6">
                            <div>
                                <div class="flex justify-between text-xs mb-1">
                                    <span class="text-slate-400">Health Index</span>
                                    <span class="font-bold text-emerald-400 font-mono" x-text="getIndices().healthIdx.toFixed(3)"></span>
                                </div>
                                <div class="w-full bg-slate-700/40 rounded-full h-1.5"><div class="bg-emerald-500 h-1.5 rounded-full" :style="`width: ${getIndices().healthIdx * 100}%`"></div></div>
                            </div>
                            <div>
                                <div class="flex justify-between text-xs mb-1">
                                    <span class="text-slate-400">Education Index</span>
                                    <span class="font-bold text-sky-400 font-mono" x-text="getIndices().eduIdx.toFixed(3)"></span>
                                </div>
                                <div class="w-full bg-slate-700/40 rounded-full h-1.5"><div class="bg-sky-500 h-1.5 rounded-full" :style="`width: ${getIndices().eduIdx * 100}%`"></div></div>
                            </div>
                            <div>
                                <div class="flex justify-between text-xs mb-1">
                                    <span class="text-slate-400">Income Index</span>
                                    <span class="font-bold text-amber-400 font-mono" x-text="getIndices().incomeIdx.toFixed(3)"></span>
                                </div>
                                <div class="w-full bg-slate-700/40 rounded-full h-1.5"><div class="bg-amber-500 h-1.5 rounded-full" :style="`width: ${getIndices().incomeIdx * 100}%`"></div></div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </template>

    </div>

    <script>
        function hdiApp() {
            return {
                countryData: null,
                simValues: {
                    health: 70,
                    expected_schooling: 12,
                    mean_schooling: 8,
                    gni: 10000
                },
                chartInstance: null,

                async fetchCountry(iso3) {
                    if (!iso3) {
                        this.countryData = null;
                        return;
                    }
                    try {
                        const res = await fetch(`/api/country/${iso3}`);
                        const data = await res.json();
                        this.countryData = data;
                        
                        // Copy values to policy sliders
                        this.simValues.health = data.baselines.health;
                        this.simValues.expected_schooling = data.baselines.expected_schooling;
                        this.simValues.mean_schooling = data.baselines.mean_schooling;
                        this.simValues.gni = data.baselines.gni;

                        // Give rendering time, then draw chart
                        this.$nextTick(() => {
                            this.renderChart(data.years, data.hdi_history);
                        });
                    } catch (err) {
                        console.error("Error fetching country metrics:", err);
                    }
                },

                resetToBaselines() {
                    if (!this.countryData) return;
                    this.simValues.health = this.countryData.baselines.health;
                    this.simValues.expected_schooling = this.countryData.baselines.expected_schooling;
                    this.simValues.mean_schooling = this.countryData.baselines.mean_schooling;
                    this.simValues.gni = this.countryData.baselines.gni;
                },

                getIndices() {
                    // 1. Health Index (LEI)
                    const healthIdx = Math.max(0, Math.min(1, (this.simValues.health - 20) / (85 - 20)));
                    
                    // 2. Education Index (EI)
                    const expectedIdx = this.simValues.expected_schooling / 18;
                    const meanIdx = this.simValues.mean_schooling / 15;
                    const eduIdx = Math.max(0, Math.min(1, (expectedIdx + meanIdx) / 2));

                    // 3. Income Index (II)
                    const incomeIdx = Math.max(0, Math.min(1, (Math.log(this.simValues.gni) - Math.log(100)) / (Math.log(75000) - Math.log(100))));

                    return { healthIdx, eduIdx, incomeIdx };
                },

                getCalculatedHDI() {
                    const indices = this.getIndices();
                    const val = Math.pow(indices.healthIdx * indices.eduIdx * indices.incomeIdx, 1/3);
                    return isNaN(val) ? 0 : val;
                },

                getTierName() {
                    const hdi = this.getCalculatedHDI();
                    if (hdi >= 0.800) return 'Very High';
                    if (hdi >= 0.700) return 'High';
                    if (hdi >= 0.550) return 'Medium';
                    return 'Low';
                },

                getTierClass() {
                    const hdi = this.getCalculatedHDI();
                    if (hdi >= 0.800) return 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400';
                    if (hdi >= 0.700) return 'bg-cyan-500/10 border-cyan-500/30 text-cyan-400';
                    if (hdi >= 0.550) return 'bg-amber-500/10 border-amber-500/30 text-amber-400';
                    return 'bg-rose-500/10 border-rose-500/30 text-rose-400';
                },

                formatCurrency(val) {
                    return Math.round(val).toLocaleString('en-US');
                },

                renderChart(labels, dataset) {
                    const ctx = document.getElementById('historyChart').getContext('2d');
                    if (this.chartInstance) {
                        this.chartInstance.destroy();
                    }
                    this.chartInstance = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Historical HDI Index',
                                data: dataset,
                                borderColor: '#818cf8',
                                backgroundColor: 'rgba(129, 140, 248, 0.1)',
                                fill: true,
                                tension: 0.3,
                                pointRadius: 3,
                                borderWidth: 2
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false }
                            },
                            scales: {
                                y: {
                                    grid: { color: 'rgba(255, 255, 255, 0.05)' },
                                    ticks: { color: '#94a3b8' }
                                },
                                x: {
                                    grid: { display: false },
                                    ticks: { color: '#94a3b8', maxTicksLimit: 8 }
                                }
                            }
                        }
                    });
                }
            }
        }
    </script>
</body>
</html>
